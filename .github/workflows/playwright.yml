name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: playwright-framework

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run UI Tests
      run: npm run test:ui:qa

    - name: Run API Tests
      run: npm run test:api:qa
      
      env:
        ENV: qa

        QA_BASE_URL: ${{ secrets.QA_BASE_URL }}
        QA_USERNAME: ${{ secrets.QA_USERNAME }}
        QA_PASSWORD: ${{ secrets.QA_PASSWORD }}

        STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        STAGING_USERNAME: ${{ secrets.STAGING_USERNAME }}
        STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}

        PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}
        PROD_USERNAME: ${{ secrets.PROD_USERNAME }}
        PROD_PASSWORD: ${{ secrets.PROD_PASSWORD }}

        API_BASE_URL: ${{ secrets.API_BASE_URL }}

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-framework/playwright-report/
        retention-days: 30